<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrackNDrop — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" />
  <link rel="stylesheet" href="common_styles.css" />
  <script>
    (function(){ if(localStorage.getItem('theme')==='dark') document.documentElement.classList.add('dark'); })();
  </script>
</head>
<body>

  <!-- Minimal Nav -->
  <nav class="nav-redesign">
    <div class="container mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex h-16 items-center justify-between">
        <a href="index.html" class="nav-logo">
          <div class="logo-icon"><i class="fas fa-box-open"></i></div>
          <span>TrackNDrop</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- Login Section -->
  <section class="min-h-[calc(100vh-4rem)] flex items-center justify-center px-4 py-12" style="background: linear-gradient(135deg, var(--background) 0%, var(--muted) 50%, var(--background) 100%)">
    <div class="w-full max-w-md" data-aos="fade-up">
      <!-- Logo -->
      <div class="text-center mb-8">
        <a href="index.html" class="inline-flex items-center gap-2">
          <div class="logo-icon" style="width:44px;height:44px;background:var(--primary);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;color:var(--primary-foreground);font-size:1.25rem">
            <i class="fas fa-box-open"></i>
          </div>
          <span style="font-family:var(--font-heading);font-weight:700;font-size:1.5rem">TrackNDrop</span>
        </a>
      </div>

      <!-- Card -->
      <div class="card" style="box-shadow:var(--shadow-xl)">
        <div class="card-header text-center" style="padding-bottom:0.5rem">
          <h2 class="card-title" style="font-size:1.5rem">Welcome back</h2>
          <p class="card-description">Enter your credentials to access your account</p>
        </div>
        <div class="card-content">
          <form id="loginForm" style="display:flex;flex-direction:column;gap:1.25rem">
            <!-- Username -->
            <div>
              <label for="username">Username</label>
              <div style="position:relative">
                <i class="fas fa-user" style="position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);color:var(--muted-foreground)"></i>
                <input type="text" id="username" placeholder="Enter your username" style="padding-left:2.5rem" required>
              </div>
            </div>
            <!-- Password -->
            <div>
              <label for="password">Password</label>
              <div style="position:relative">
                <i class="fas fa-lock" style="position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);color:var(--muted-foreground)"></i>
                <input type="password" id="password" placeholder="••••••••" style="padding-left:2.5rem" required>
              </div>
            </div>
            <!-- Role Selection -->
            <div>
              <label>Login as</label>
              <div class="flex items-center gap-4 mt-1">
                <label class="inline-flex items-center gap-2 text-sm cursor-pointer" style="color:var(--card-foreground)">
                  <input type="radio" name="user_type" value="user" checked style="accent-color:var(--teal);width:auto">
                  <span>User</span>
                </label>
                <label class="inline-flex items-center gap-2 text-sm cursor-pointer" style="color:var(--card-foreground)">
                  <input type="radio" name="user_type" value="admin" style="accent-color:var(--teal);width:auto">
                  <span>Admin</span>
                </label>
                <label class="inline-flex items-center gap-2 text-sm cursor-pointer" style="color:var(--card-foreground)">
                  <input type="radio" name="user_type" value="delivery_executive" style="accent-color:var(--teal);width:auto">
                  <span>Delivery</span>
                </label>
              </div>
            </div>
            <!-- Submit -->
            <button type="submit" class="btn-primary btn-lg w-full">
              <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
          </form>

          <!-- Divider -->
          <div style="position:relative;margin:1.5rem 0">
            <div style="position:absolute;inset:0;display:flex;align-items:center"><span style="width:100%;height:1px;background:var(--border)"></span></div>
            <div style="position:relative;display:flex;justify-content:center"><span style="background:var(--card);padding:0 0.75rem;font-size:0.75rem;text-transform:uppercase;color:var(--muted-foreground)">Or continue with</span></div>
          </div>

          <!-- Social Buttons -->
          <div class="grid grid-cols-2 gap-4">
            <button type="button" class="btn-outline" style="justify-content:center">
              <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
              Google
            </button>
            <button type="button" class="btn-outline" style="justify-content:center">
              <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
              GitHub
            </button>
          </div>

          <!-- Sign up link -->
          <p class="text-center text-sm mt-6" style="color:var(--muted-foreground)">
            Don't have an account? <a href="signup.html" style="color:var(--teal);font-weight:500">Sign up</a>
          </p>
        </div>
      </div>

      <!-- Terms -->
      <p class="text-center text-sm mt-6" style="color:var(--muted-foreground)">
        By signing in, you agree to our <a href="#" style="color:var(--teal)">Terms</a> and <a href="#" style="color:var(--teal)">Privacy Policy</a>
      </p>
    </div>
  </section>

  <!-- Login Success Overlay -->
  <div id="loginSuccessOverlay" class="fixed inset-0 z-50 hidden items-center justify-center" style="background:rgba(0,0,0,0.6)">
    <div class="card text-center" style="width:320px;padding:2rem;box-shadow:var(--shadow-xl);animation:fadeInUp 300ms ease both">
      <div class="mx-auto w-20 h-20 rounded-full flex items-center justify-center" style="background:#dcfce7;animation:success-pop 600ms ease both">
        <i class="fas fa-check text-3xl" style="color:#16a34a"></i>
        <span class="absolute inset-0 rounded-full" style="border:2px solid #86efac;animation:ring-expand 900ms ease-out 200ms both"></span>
      </div>
      <h3 style="margin-top:1rem;font-size:1.25rem;font-weight:600">Welcome back!</h3>
      <p class="text-muted text-sm">Logging you in...</p>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script>AOS.init({ once: true, duration: 600, offset: 50 });</script>
  <script src="script.js"></script>
  <script src="login.js"></script>
  <script src="floating-theme-toggle.js"></script>
  <script src="role-access.js"></script>
</body>
</html>
